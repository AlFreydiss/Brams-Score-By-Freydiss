<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citation Anime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ff3b3b;
    --accent-deep: #7a0f0f;
    --accent-glow: rgba(255, 59, 59, 0.45);
    --bg: #0b0b0b;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrapper {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
  }

  /* ── CARD ── */
  .card {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── BACKGROUND ── */
  .bg {
    position: absolute;
    inset: -6%;
    width: 112%;
    height: 112%;
    background-size: cover;
    background-position: center 20%;
    transform: scale(1);
    transition: transform 0.6s cubic-bezier(.25,.46,.45,.94),
                filter 0.4s ease;
    filter: brightness(0.85) contrast(1.1) saturate(1.05);
    will-change: transform;
  }

  .card:hover .bg {
    filter: brightness(0.95) contrast(1.15) saturate(1.1);
  }

  /* ── OVERLAYS ── */
  .ov-dark {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right,
        rgba(6, 2, 2, 0.93) 0%,
        rgba(6, 2, 2, 0.88) 30%,
        rgba(4, 1, 1, 0.65) 52%,
        rgba(0,0,0,0.25) 70%,
        transparent 100%
      ),
      linear-gradient(to top,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.1) 40%,
        transparent 70%
      );
  }

  .ov-red {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse 55% 55% at 8% 92%,
      var(--accent-deep) 0%,
      transparent 65%
    );
    opacity: 0.28;
  }

  /* ── SCANLINES ── */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.045) 2px,
      rgba(0,0,0,0.045) 3px
    );
    pointer-events: none;
    z-index: 9;
  }

  /* ── GRAIN ── */
  .grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px 128px;
  }

  /* ── PARTICLES ── */
  #particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 6;
  }

  /* ── BORDER ── */
  .border-frame {
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(255,59,59,0.18);
    pointer-events: none;
    z-index: 11;
    transition: border-color 0.4s ease;
  }
  .card:hover .border-frame {
    border-color: rgba(255,59,59,0.35);
  }

  /* ── COINS ── */
  .corner {
    position: absolute;
    width: 24px;
    height: 24px;
    z-index: 12;
    pointer-events: none;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--accent);
    transition: box-shadow 0.4s ease;
  }
  .corner::before { top: 0; left: 0; width: 100%; height: 2px; }
  .corner::after  { top: 0; left: 0; width: 2px; height: 100%; }
  .corner-tl { top: 14px; left: 14px; }
  .corner-tr { top: 14px; right: 14px; transform: scaleX(-1); }
  .corner-bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
  .corner-br { bottom: 14px; right: 14px; transform: scale(-1,-1); }

  .card:hover .corner::before,
  .card:hover .corner::after {
    box-shadow: 0 0 8px var(--accent-glow), 0 0 18px var(--accent-glow);
  }

  /* ── GRAND GUILLEMET DÉCORATIF ── */
  .big-quote {
    position: absolute;
    top: -18px;
    left: 34px;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(140px, 20vw, 260px);
    font-weight: 900;
    color: var(--accent);
    opacity: 0.07;
    line-height: 1;
    z-index: 2;
    user-select: none;
    pointer-events: none;
  }

  /* ── ZONE TEXTE ── */
  .content {
    position: absolute;
    inset: 0;
    padding: clamp(28px, 5%, 68px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    width: 60%;
    z-index: 7;
  }

  /* ── CITATION ── */
  .quote {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(16px, 1.9vw, 28px);
    font-weight: 700;
    color: #ffffff;
    line-height: 1.65;
    letter-spacing: 0.012em;
    text-shadow:
      0 2px 24px rgba(0,0,0,0.95),
      0 0 60px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.75s ease 0.1s forwards;
  }

  /* ── SÉPARATEUR ── */
  .sep {
    width: 48px;
    height: 2px;
    background: var(--accent);
    margin: 24px 0;
    box-shadow: 0 0 8px var(--accent-glow), 0 0 20px var(--accent-glow);
    opacity: 0;
    animation: fadeUp 0.75s ease 0.38s forwards;
    transition: box-shadow 0.4s ease;
  }
  .card:hover .sep {
    box-shadow: 0 0 14px var(--accent-glow), 0 0 35px var(--accent-glow);
  }

  /* ── NOM PERSONNAGE ── */
  .name {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(11px, 1.3vw, 19px);
    font-weight: 900;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 0 0 22px var(--accent-glow);
    opacity: 0;
    transform: translateY(14px);
    animation: fadeUp 0.75s ease 0.52s forwards;
  }

  /* ── ANIME ── */
  .anime {
    font-family: 'Inter', sans-serif;
    font-size: clamp(9px, 0.9vw, 12px);
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    margin-top: 6px;
    animation: fadeUp 0.75s ease 0.68s forwards;
  }

  /* ── WATERMARK ── */
  .watermark {
    position: absolute;
    bottom: 20px;
    right: 24px;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    z-index: 12;
    pointer-events: none;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="card" id="card">
    <div class="bg" id="bg"></div>
    <div class="ov-dark"></div>
    <div class="ov-red"></div>
    <div class="scanlines"></div>
    <div class="grain"></div>
    <canvas id="particles"></canvas>
    <div class="border-frame"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="big-quote">&ldquo;</div>
    <div class="content">
      <p class="quote" id="quote"></p>
      <div class="sep" id="sep"></div>
      <div class="name" id="name"></div>
      <div class="anime" id="anime"></div>
    </div>
    <div class="watermark">Brams Score &middot; Freydiss</div>
  </div>
</div>

<script>
// ── SYSTÈME DYNAMIQUE ──────────────────────────────
function setCitation({ quote, character, anime, image, color }) {
  const accentColor = color || '#ff3b3b';
  const r = parseInt(accentColor.slice(1,3), 16);
  const g = parseInt(accentColor.slice(3,5), 16);
  const b = parseInt(accentColor.slice(5,7), 16);
  const deep = `rgb(${Math.floor(r*0.45)}, ${Math.floor(g*0.1)}, ${Math.floor(b*0.1)})`;

  document.documentElement.style.setProperty('--accent', accentColor);
  document.documentElement.style.setProperty('--accent-deep', deep);
  document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.45)`);

  document.getElementById('bg').style.backgroundImage = `url('${image}')`;
  document.getElementById('quote').textContent = `« ${quote} »`;
  document.getElementById('name').textContent = character;
  document.getElementById('anime').textContent = anime;

  particleColor = { r, g, b };

  // Relancer les animations
  ['quote','sep','name','anime'].forEach(id => {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
  });
}

// ── PARALLAX ──────────────────────────────────────
const card = document.getElementById('card');
const bg   = document.getElementById('bg');
let tX = 0, tY = 0, cX = 0, cY = 0;

card.addEventListener('mousemove', e => {
  const r = card.getBoundingClientRect();
  tX = ((e.clientX - r.left) / r.width  - 0.5) * 22;
  tY = ((e.clientY - r.top)  / r.height - 0.5) * 14;
});
card.addEventListener('mouseleave', () => { tX = 0; tY = 0; });

(function loopParallax() {
  cX += (tX - cX) * 0.07;
  cY += (tY - cY) * 0.07;
  bg.style.transform = `translate(${cX}px, ${cY}px) scale(1.1)`;
  requestAnimationFrame(loopParallax);
})();

// ── PARTICLES ─────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
let particleColor = { r: 255, g: 59, b: 59 };

function resize() {
  canvas.width  = card.offsetWidth;
  canvas.height = card.offsetHeight;
}
resize();
new ResizeObserver(resize).observe(card);

const pts = Array.from({ length: 38 }, () => ({
  x:  Math.random(),
  y:  Math.random(),
  r:  Math.random() * 1.6 + 0.4,
  vx: (Math.random() - 0.5) * 0.0003,
  vy: -(Math.random() * 0.0006 + 0.0002),
  o:  Math.random() * 0.55 + 0.1,
  do: (Math.random() * 0.004 + 0.001) * (Math.random() < 0.5 ? 1 : -1),
}));

(function loopParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const { r, g, b } = particleColor;

  pts.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.o += p.do;
    if (p.o > 0.65 || p.o < 0.05) p.do *= -1;
    if (p.y < -0.02) { p.y = 1.02; p.x = Math.random(); }
    if (p.x < -0.02) p.x = 1.02;
    if (p.x > 1.02)  p.x = -0.02;

    const px = p.x * canvas.width;
    const py = p.y * canvas.height;

    // glow halo
    const grd = ctx.createRadialGradient(px, py, 0, px, py, p.r * 5);
    grd.addColorStop(0, `rgba(${r},${g},${b},${p.o * 0.7})`);
    grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.fillStyle = grd;
    ctx.arc(px, py, p.r * 5, 0, Math.PI * 2);
    ctx.fill();

    // core
    ctx.beginPath();
    ctx.fillStyle = `rgba(255,220,220,${p.o})`;
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(loopParticles);
})();

// ── EXEMPLE ───────────────────────────────────────
setCitation({
  quote:     "Personne ne sait ce qui va se passer. Décide simplement de ce que tu ne regretteras pas.",
  character: "Levi Ackerman",
  anime:     "Attack on Titan",
  image:     "https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Gatto_europeo4.jpg/1200px-Gatto_europeo4.jpg",
  color:     "#ff3b3b"
});
</script>
</body>
</html>
