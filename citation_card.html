<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Righteous';
    src: url('Righteous-Regular.ttf') format('truetype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Michland';
    src: url('Michland Script.otf') format('opentype');
  }

  :root {
    --accent: #ff3b3b;
    --accent-deep: #7a0f0f;
    --accent-glow: rgba(255,59,59,0.45);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 675px;
    overflow: hidden;
    background: #0b0b0b;
  }

  .card {
    position: relative;
    width: 1200px;
    height: 675px;
    overflow: hidden;
    background: #0b0b0b;
  }

  /* ── BACKGROUND ── */
  .bg {
    position: absolute;
    inset: -6%;
    width: 112%;
    height: 112%;
    background-size: cover;
    background-position: center 20%;
    background-color: #0b0b0b;
    filter: brightness(0.85) contrast(1.1) saturate(1.05);
  }

  /* ── OVERLAYS ── */
  .ov-dark {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right,
        rgba(6,2,2,0.93) 0%,
        rgba(6,2,2,0.88) 30%,
        rgba(4,1,1,0.65) 52%,
        rgba(0,0,0,0.25) 70%,
        transparent 100%
      ),
      linear-gradient(to top,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.1) 40%,
        transparent 70%
      );
  }

  .ov-red {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 55% 55% at 8% 92%, var(--accent-deep) 0%, transparent 65%);
    opacity: 0.28;
  }

  /* ── SCANLINES ── */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.045) 2px, rgba(0,0,0,0.045) 3px);
    pointer-events: none;
    z-index: 9;
  }

  /* ── GRAIN ── */
  .grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px 128px;
  }

  /* ── PARTICLES ── */
  #particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 6;
  }

  /* ── BORDER ── */
  .border-frame {
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(255,59,59,0.18);
    pointer-events: none;
    z-index: 11;
  }

  /* ── COINS ── */
  .corner { position: absolute; width: 24px; height: 24px; z-index: 12; }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--accent);
  }
  .corner::before { top: 0; left: 0; width: 100%; height: 2px; }
  .corner::after  { top: 0; left: 0; width: 2px; height: 100%; }
  .corner-tl { top: 14px; left: 14px; }
  .corner-tr { top: 14px; right: 14px; transform: scaleX(-1); }
  .corner-bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
  .corner-br { bottom: 14px; right: 14px; transform: scale(-1,-1); }

  /* ── GRAND GUILLEMET ── */
  .big-quote {
    position: absolute;
    top: -28px;
    left: 34px;
    font-family: Georgia, serif;
    font-size: 320px;
    font-weight: 900;
    color: var(--accent);
    opacity: 0.07;
    line-height: 1;
    z-index: 2;
    user-select: none;
  }

  /* ── ZONE TEXTE ── */
  .content {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 62%;
    padding: 64px 54px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 7;
  }

  /* ── CITATION ── */
  .quote {
    font-family: 'Righteous', sans-serif;
    font-size: 30px;
    font-weight: 400;
    color: #ffffff;
    line-height: 1.65;
    letter-spacing: 0.01em;
    text-shadow: 0 2px 24px rgba(0,0,0,0.95), 0 0 60px rgba(0,0,0,0.6);
  }

  /* ── SÉPARATEUR ── */
  .sep {
    width: 50px;
    height: 2px;
    background: var(--accent);
    margin: 26px 0;
    box-shadow: 0 0 10px var(--accent-glow), 0 0 24px var(--accent-glow);
  }

  /* ── NOM ── */
  .name {
    font-family: 'Righteous', sans-serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 0 0 22px var(--accent-glow);
  }

  /* ── ANIME ── */
  .anime {
    font-family: 'Righteous', sans-serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 7px;
    opacity: 0.85;
  }

  /* ── WATERMARK ── */
  .watermark {
    position: absolute;
    bottom: 20px;
    right: 24px;
    font-family: 'Righteous', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    z-index: 12;
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="bg" id="bg"></div>
  <div class="ov-dark"></div>
  <div class="ov-red"></div>
  <div class="scanlines"></div>
  <div class="grain"></div>
  <canvas id="particles"></canvas>
  <div class="border-frame"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="big-quote">&ldquo;</div>
  <div class="content">
    <p class="quote" id="quote"></p>
    <div class="sep" id="sep"></div>
    <div class="name" id="name"></div>
    <div class="anime" id="anime"></div>
  </div>
  <div class="watermark">Brams Score &middot; Freydiss</div>
</div>

<script>
function setCitation({ quote, character, anime, image, color }) {
  const accent = color || '#ff3b3b';
  const r = parseInt(accent.slice(1,3), 16);
  const g = parseInt(accent.slice(3,5), 16);
  const b = parseInt(accent.slice(5,7), 16);
  const deep = `rgb(${Math.floor(r*0.45)},${Math.floor(g*0.1)},${Math.floor(b*0.1)})`;

  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--accent-deep', deep);
  document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.45)`);

  document.getElementById('bg').style.backgroundImage = image ? `url('${image}')` : '';
  document.getElementById('quote').textContent = '« ' + quote + ' »';
  document.getElementById('name').textContent = character;
  document.getElementById('anime').textContent = anime;

  particleColor = { r, g, b };
}

// Particles
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = 1200;
canvas.height = 675;

let particleColor = { r: 255, g: 59, b: 59 };

const pts = Array.from({ length: 40 }, () => ({
  x: Math.random() * 1200,
  y: Math.random() * 675,
  r: Math.random() * 1.8 + 0.4,
  vx: (Math.random() - 0.5) * 0.35,
  vy: -(Math.random() * 0.6 + 0.15),
  o: Math.random() * 0.55 + 0.1,
  do: (Math.random() * 0.004 + 0.001) * (Math.random() < 0.5 ? 1 : -1),
}));

function drawParticles() {
  ctx.clearRect(0, 0, 1200, 675);
  const { r, g, b } = particleColor;
  pts.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.o += p.do;
    if (p.o > 0.65 || p.o < 0.05) p.do *= -1;
    if (p.y < -5)    { p.y = 680; p.x = Math.random() * 1200; }
    if (p.x < -5)    p.x = 1205;
    if (p.x > 1205)  p.x = -5;

    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
    grd.addColorStop(0, `rgba(${r},${g},${b},${p.o * 0.7})`);
    grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath(); ctx.fillStyle = grd;
    ctx.arc(p.x, p.y, p.r * 5, 0, Math.PI * 2); ctx.fill();

    ctx.beginPath(); ctx.fillStyle = `rgba(255,220,220,${p.o})`;
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();
</script>
</body>
</html>
