name: Sync One Piece Chapters

on:
  schedule:
    # Tous les lundis à 06:00 UTC (après sortie hebdomadaire du chapitre)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # déclenchement manuel possible

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        run: node scripts/sync-chapters.js

      - name: Commit & push si changement
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brams-website/public/data/chapters.json
          if git diff --staged --quiet; then
            echo "Aucun nouveau chapitre — commit ignoré."
          else
            LAST=$(node -e "const d=require('./brams-website/public/data/chapters.json'); console.log(d[d.length-1]?.num ?? '?')" 2>/dev/null || echo "?")
            git commit -m "chore: sync chapitres One Piece — dernier ch.${LAST}"
            git push
          fi
