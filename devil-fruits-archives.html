<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONE PIECE — ARCHIVES CONFIDENTIELLES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        colors: { void:'#030308', abyss:'#060610', s1:'#0A0A14', s2:'#0F0F1C', s3:'#141420', bdim:'#111118', bmid:'#1A1A26' },
        fontFamily: { display:['"Cinzel Decorative"','serif'], title:['Cinzel','serif'], body:['Inter','sans-serif'], ui:['Rajdhani','sans-serif'] }
      }}
    }
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#030308;color:#C8C8D8;font-family:'Inter',sans-serif;height:100vh;overflow:hidden}

    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#06060E}
    ::-webkit-scrollbar-thumb{background:#9F1239;border-radius:2px}
    ::-webkit-scrollbar-thumb:hover{background:#BE123C}

    /* ── Backgrounds ── */
    .poneglyph-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.03;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,#EAB308 39px,#EAB308 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,#EAB308 39px,#EAB308 40px);background-size:40px 40px}
    .poneglyph-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 70% at 50% 50%,transparent 30%,#030308 100%)}
    .noise-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px 256px}
    .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 100% 100% at 50% 100%,rgba(159,18,57,0.07) 0%,transparent 55%)}

    /* ── Rarity CSS vars ── */
    .rv-legendaire{--rc:#EAB308;--rg:rgba(234,179,8,0.4);--rb:rgba(234,179,8,0.06);--rs:rgba(234,179,8,0.15)}
    .rv-mythique  {--rc:#A855F7;--rg:rgba(168,85,247,0.4);--rb:rgba(168,85,247,0.06);--rs:rgba(168,85,247,0.15)}
    .rv-interdit  {--rc:#DC2626;--rg:rgba(220,38,38,0.5); --rb:rgba(220,38,38,0.1); --rs:rgba(220,38,38,0.2)}
    .rv-epique    {--rc:#3B82F6;--rg:rgba(59,130,246,0.35);--rb:rgba(59,130,246,0.06);--rs:rgba(59,130,246,0.12)}
    .rv-rare      {--rc:#10B981;--rg:rgba(16,185,129,0.35);--rb:rgba(16,185,129,0.06);--rs:rgba(16,185,129,0.12)}
    .rv-secret    {--rc:#7C3AED;--rg:rgba(124,58,237,0.4); --rb:rgba(124,58,237,0.08);--rs:rgba(124,58,237,0.15)}
    .rv-commun    {--rc:#555566;--rg:rgba(85,85,102,0.2);  --rb:rgba(85,85,102,0.04); --rs:rgba(85,85,102,0.08)}

    /* ── Header ── */
    #app-header{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(3,3,8,0.97);backdrop-filter:blur(20px);border-bottom:1px solid #0F0F1C}
    .univ-tab-row{display:flex;align-items:center;height:34px;padding:0 16px;gap:2px;border-bottom:1px solid #0A0A12}
    .logo-block{font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:.2em;color:#9F1239;margin-right:16px;white-space:nowrap;opacity:.8}
    .utab{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:.15em;padding:4px 10px;border-radius:3px;border:1px solid transparent;color:#333;cursor:pointer;transition:all .15s;background:transparent;white-space:nowrap}
    .utab:hover{color:#666;background:#0A0A14}
    .utab.active{color:#E8E8E8;background:rgba(159,18,57,.12);border-color:rgba(159,18,57,.35);box-shadow:0 0 8px rgba(159,18,57,.2)}
    .utab.locked{opacity:.3;cursor:default;pointer-events:none}
    .brand-row{display:flex;align-items:center;height:48px;padding:0 20px;position:relative;overflow:hidden}
    .brand-wm{position:absolute;left:50%;transform:translateX(-50%);font-family:'Cinzel Decorative',serif;font-size:42px;color:#fff;opacity:.018;letter-spacing:.3em;white-space:nowrap;pointer-events:none;user-select:none}
    .brand-left{display:flex;align-items:center;gap:12px;z-index:1}
    .brand-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(159,18,57,.4);border-radius:4px;background:rgba(159,18,57,.08);font-size:16px;box-shadow:0 0 10px rgba(159,18,57,.15)}
    .brand-text .label{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:.3em;color:#9F1239;text-transform:uppercase}
    .brand-text .title{font-family:'Cinzel Decorative',serif;font-size:13px;letter-spacing:.15em;color:#E8E8DC;line-height:1.1}
    .brand-stats{display:flex;align-items:center;gap:8px;margin-left:20px;z-index:1}
    .hstat{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;color:#333;padding:3px 10px;border:1px solid #111;border-radius:2px}
    .hstat strong{color:#666;margin-right:4px}
    .hstat.active-stat{border-color:rgba(16,185,129,.25);color:#10B981}
    .section-tabs{display:flex;align-items:center;gap:2px;margin-left:auto;z-index:1}
    .stab{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:.15em;padding:6px 14px;border-radius:3px;border:1px solid transparent;color:#333;cursor:pointer;transition:all .15s;background:transparent;display:flex;align-items:center;gap:6px;text-transform:uppercase}
    .stab:hover{color:#666;background:#0A0A14}
    .stab.active{color:#E8E8E8;border-color:#1A1A24;background:#0A0A14}
    .stab.active::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:#9F1239;box-shadow:0 0 6px #9F1239}
    .header-line{height:1px;background:linear-gradient(90deg,transparent,#9F1239 20%,#EAB308 50%,#9F1239 80%,transparent);opacity:.5}

    /* ── Sidebar ── */
    #sidebar{position:fixed;left:0;top:84px;bottom:0;width:216px;background:rgba(4,4,12,.97);backdrop-filter:blur(12px);border-right:1px solid #0C0C16;z-index:40;display:flex;flex-direction:column;overflow:hidden}
    .sb-univ{padding:16px 14px 12px;border-bottom:1px solid #0C0C14}
    .sb-univ-inner{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:5px;background:linear-gradient(135deg,rgba(159,18,57,.1),rgba(159,18,57,.04));border:1px solid rgba(159,18,57,.2);box-shadow:0 0 12px rgba(159,18,57,.08) inset}
    .sb-univ-icon{font-size:22px;flex-shrink:0}
    .sb-univ-name{font-family:'Cinzel',serif;font-size:13px;color:#E0E0E8;letter-spacing:.06em}
    .sb-univ-sub{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:.25em;color:#9F1239;text-transform:uppercase;margin-top:1px}
    .sb-stats{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid #0C0C14}
    .sb-stat{flex:1;background:#08080F;border:1px solid #0F0F18;border-radius:3px;padding:6px 8px;text-align:center}
    .sb-stat-val{font-family:'Cinzel',serif;font-size:16px;color:#C0C0CC;display:block}
    .sb-stat-lbl{font-family:'Rajdhani',sans-serif;font-size:8px;letter-spacing:.2em;color:#333;text-transform:uppercase}
    .sb-search{padding:10px 14px;border-bottom:1px solid #0C0C14}
    .sb-search-inner{position:relative}
    .sb-search-inner svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:#2A2A36}
    .sb-search-input{width:100%;background:#07070E;border:1px solid #0F0F18;color:#AAA;font-family:'Inter',sans-serif;font-size:12px;padding:7px 12px 7px 30px;border-radius:3px;outline:none;transition:border-color .2s}
    .sb-search-input:focus{border-color:#1A1A26;box-shadow:0 0 0 2px rgba(159,18,57,.1)}
    .sb-search-input::placeholder{color:#222230}
    .sb-section-lbl{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:.3em;color:#1E1E2A;text-transform:uppercase;padding:10px 14px 4px}
    .sb-cats{flex:1;overflow-y:auto;padding:2px 10px}
    .sbcat{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:4px;border:1px solid transparent;cursor:pointer;transition:all .15s;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:500;color:#3A3A4A;background:transparent;text-align:left}
    .sbcat:hover{background:#0A0A14;color:#777}
    .sbcat.active{background:linear-gradient(135deg,rgba(159,18,57,.1),rgba(159,18,57,.04));color:#C8C8D0;border-color:rgba(159,18,57,.2);box-shadow:0 0 8px rgba(159,18,57,.06) inset}
    .sbcat-count{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:#1E1E28;transition:color .15s}
    .sbcat.active .sbcat-count{color:#9F1239}
    .sb-bottom{padding:10px 14px;border-top:1px solid #0C0C14;margin-top:auto}
    .spoiler-toggle{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:4px;border:1px solid #0F0F18;cursor:pointer;transition:all .2s;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#2A2A38;background:transparent}
    .spoiler-toggle:hover{border-color:#1A1A26;color:#555}
    .spoiler-toggle.on{border-color:rgba(234,179,8,.3);color:#EAB308;background:rgba(234,179,8,.04)}
    .sp-switch{width:28px;height:16px;background:#0F0F18;border-radius:8px;position:relative;transition:background .25s;margin-left:auto;flex-shrink:0}
    .sp-switch.on{background:rgba(234,179,8,.25);border:1px solid #EAB308}
    .sp-switch::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:#282838;transition:all .25s}
    .sp-switch.on::after{left:13px;background:#EAB308;box-shadow:0 0 5px #EAB308}

    /* ── Register Panel ── */
    #register-panel{flex:1;overflow-y:auto;border-right:1px solid #0C0C14;display:flex;flex-direction:column;min-width:0}
    .reg-filter-bar{position:sticky;top:0;z-index:20;background:rgba(3,3,8,.97);backdrop-filter:blur(12px);border-bottom:1px solid #0C0C14;padding:10px 16px;display:flex;flex-direction:column;gap:8px}
    .reg-filter-row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .reg-filter-tabs{display:flex;align-items:center;gap:3px;flex-wrap:wrap}
    .ftab{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:2px;border:1px solid #0F0F18;color:#2A2A38;cursor:pointer;transition:all .15s;background:transparent;display:flex;align-items:center;gap:4px;white-space:nowrap}
    .ftab:hover{color:#555;border-color:#181820}
    .ftab.active{color:var(--rc,#EAB308);border-color:var(--rc,#EAB308);background:var(--rb,rgba(234,179,8,.06));box-shadow:0 0 8px var(--rg,rgba(234,179,8,.2))}
    .reg-count{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:.15em;color:#1E1E28;margin-left:auto;white-space:nowrap}
    .reg-sort{display:flex;align-items:center;gap:4px}
    .sort-btn{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:2px;border:1px solid #0F0F18;color:#222;cursor:pointer;transition:all .15s;background:transparent}
    .sort-btn:hover{color:#444;border-color:#181820}
    .sort-btn.active{color:#EAB308;border-color:rgba(234,179,8,.3)}
    #register-rows{flex:1}
    .reg-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:8px}
    .reg-empty-icon{font-size:2.5rem;opacity:.15}
    .reg-empty-text{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:.2em;color:#1A1A24;text-transform:uppercase}

    /* ── Archive Row ── */
    .archive-row{position:relative;display:flex;align-items:center;gap:0;padding:0 14px 0 0;min-height:68px;border-bottom:1px solid #0A0A12;cursor:pointer;transition:transform .15s ease,background .15s ease;background:transparent;overflow:hidden}
    .row-accent{width:3px;min-height:68px;flex-shrink:0;background:var(--rc,#1A1A24);opacity:.25;transition:opacity .15s,box-shadow .15s,width .15s;align-self:stretch}
    .archive-row:hover{background:rgba(255,255,255,.015);transform:translateX(3px)}
    .archive-row:hover .row-accent{opacity:.7;box-shadow:0 0 10px var(--rg,transparent)}
    .archive-row.selected{background:var(--rb,rgba(255,255,255,.02))}
    .archive-row.selected .row-accent{opacity:1;width:4px;box-shadow:0 0 14px var(--rc,transparent)}
    .archive-row.classified-row{background:rgba(159,18,57,.03)}
    .archive-row.classified-row:hover{background:rgba(159,18,57,.07)}
    .row-num{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;color:#18182A;width:44px;flex-shrink:0;padding-left:12px;text-align:left}
    .row-emoji-cell{width:30px;flex-shrink:0;text-align:center;font-size:18px;opacity:.7;transition:opacity .15s}
    .archive-row:hover .row-emoji-cell{opacity:1}
    .row-body{flex:1;padding:10px 12px 10px 8px;min-width:0}
    .row-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#C8C8D8;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
    .row-meta{font-family:'Rajdhani',sans-serif;font-size:11px;color:#3A3A4A;letter-spacing:.06em;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-meta .sep{color:#1E1E28;margin:0 4px}
    .row-tags{font-family:'Rajdhani',sans-serif;font-size:9px;color:#1E1E2A;letter-spacing:.1em;margin-top:2px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;padding:8px 0}
    .rbadge{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;border-radius:2px;border:1px solid var(--rc,#1A1A24);color:var(--rc,#444);background:var(--rb,rgba(0,0,0,.4));box-shadow:0 0 6px var(--rg,transparent);white-space:nowrap;transition:box-shadow .15s}
    .archive-row:hover .rbadge{box-shadow:0 0 12px var(--rg,transparent)}
    .archive-row.selected .rbadge{box-shadow:0 0 16px var(--rg,transparent)}
    .fav-btn{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;color:#1A1A28;font-size:13px;transition:color .15s;padding:0}
    .fav-btn:hover{color:#9F1239}
    .fav-btn.active{color:#EAB308}

    /* Classified row specifics */
    .row-redacted{color:#2A0010 !important;letter-spacing:.2em;font-family:'Rajdhani',sans-serif !important;font-size:12px !important}
    .classified-stamp{font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;letter-spacing:.3em;color:#6B0018;text-transform:uppercase;margin-top:3px;display:flex;align-items:center;gap:5px}
    .classified-stamp::before{content:'';display:inline-block;width:16px;height:1px;background:#6B0018}
    .classified-stamp::after{content:'';display:inline-block;width:16px;height:1px;background:#6B0018}

    /* ── Detail Panel ── */
    #detail-panel{width:400px;flex-shrink:0;overflow-y:auto;background:rgba(4,4,12,.6);display:flex;flex-direction:column}
    .detail-default{position:relative;overflow:hidden;height:100%;min-height:100%;padding:0}
    .detail-classified-wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-family:'Cinzel Decorative',serif;font-size:52px;color:rgba(159,18,57,.05);letter-spacing:.3em;white-space:nowrap;pointer-events:none;z-index:0;user-select:none}
    .detail-stamp-header{position:relative;z-index:1;padding:20px 20px 16px;border-bottom:1px solid #0C0C14}
    .stamp-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .stamp-org{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:.3em;color:#2A1010;text-transform:uppercase}
    .stamp-access{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:.2em;color:#9F1239;border:1px solid rgba(159,18,57,.3);padding:2px 8px;border-radius:2px}
    .stamp-title{font-family:'Cinzel',serif;font-size:16px;letter-spacing:.25em;color:#9F1239;text-transform:uppercase;border:2px solid rgba(159,18,57,.3);padding:6px 16px;display:inline-block;border-radius:2px;background:rgba(159,18,57,.05);transform:rotate(-1deg);box-shadow:0 0 12px rgba(159,18,57,.1)}
    .stamp-title-wrap{text-align:center}
    .marine-coords{font-family:'Rajdhani',sans-serif;font-size:8px;letter-spacing:.15em;color:#12121E;text-transform:uppercase;text-align:center;margin-top:8px}
    .feat-panel{position:relative;z-index:1;padding:20px}
    .feat-emoji-wrap{text-align:center;margin-bottom:16px}
    .feat-emoji-big{font-size:64px;display:block;filter:drop-shadow(0 0 24px var(--rc,#EAB308)) drop-shadow(0 0 8px var(--rc,#EAB308));animation:feFloat 5s ease-in-out infinite}
    @keyframes feFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .feat-name{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:#E0E0EC;letter-spacing:.1em;text-align:center;line-height:1.2;margin-bottom:10px}
    .feat-rarity-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
    .feat-type-row{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:.1em;color:#3A3A4A;text-align:center;margin-bottom:16px}
    .feat-divider{height:1px;background:linear-gradient(90deg,transparent,var(--rc,#EAB308),transparent);opacity:.3;margin:14px 0}
    .feat-stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
    .feat-stat{background:#07070F;border:1px solid #0D0D18;border-radius:3px;padding:8px 6px;text-align:center}
    .feat-stat-lbl{font-family:'Rajdhani',sans-serif;font-size:8px;letter-spacing:.2em;color:#1E1E2A;text-transform:uppercase;margin-bottom:3px}
    .feat-stat-val{font-family:'Cinzel',serif;font-size:13px;color:#888;font-weight:600}
    .feat-desc{font-family:'Inter',sans-serif;font-size:12px;line-height:1.65;color:#3A3A4A;margin-bottom:18px;padding:12px;background:#06060E;border:1px solid #0C0C14;border-left:2px solid var(--rc,#EAB308);border-radius:3px}
    .btn-open-dossier{width:100%;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:10px 20px;border-radius:3px;border:1px solid var(--rc,#EAB308);color:var(--rc,#EAB308);background:var(--rb,rgba(234,179,8,.05));cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}
    .btn-open-dossier::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--rc,#EAB308),transparent);opacity:0;transition:opacity .25s}
    .btn-open-dossier:hover{box-shadow:0 0 16px var(--rg,rgba(234,179,8,.3));color:#fff}
    .btn-open-dossier:hover::before{opacity:.1}

    /* ── Detail Selected ── */
    .detail-selected{height:100%;display:flex;flex-direction:column}
    .detail-hero{position:relative;min-height:160px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
    .detail-hero-bg{position:absolute;inset:0;opacity:.4}
    .detail-hero-emoji{font-size:72px;position:relative;z-index:2;filter:drop-shadow(0 0 30px var(--rc,#EAB308)) drop-shadow(0 0 10px var(--rc,#EAB308))}
    .detail-hero-scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--rc,#9F1239),transparent);opacity:.6;animation:scanLine 3s linear infinite;z-index:3}

  let currentCat    = "tout";
  let currentFilter = "tout";
  let currentSort   = "rarity";
  let spoilerMode   = false;
  let searchQuery   = "";
  let selectedId    = null;

  // ══════════════════════════════════════════════════════════
  // FILTER + SORT
  // ══════════════════════════════════════════════════════════
  function getFiltered() {
    let list = [...FRUITS];
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(f =>
        f.name.toLowerCase().includes(q) ||
        f.user.toLowerCase().includes(q) ||
        f.tags.some(t => t.toLowerCase().includes(q)) ||
        f.type.toLowerCase().includes(q)
      );
    }
    if (currentCat !== "tout") {
      if (currentCat === "secret") list = list.filter(f => f.classified);
      else list = list.filter(f => f.category === currentCat);
    }
    if (currentFilter !== "tout") {
      if (currentFilter === "logia")      list = list.filter(f => f.type === "Logia");
      if (currentFilter === "paramecia")  list = list.filter(f => f.type === "Paramecia");
      if (currentFilter === "zoan")       list = list.filter(f => f.type === "Zoan" && f.rarity !== "mythique");
      if (currentFilter === "mythique")   list = list.filter(f => f.rarity === "mythique");
      if (currentFilter === "legendaire") list = list.filter(f => f.rarity === "legendaire");
      if (currentFilter === "classifie")  list = list.filter(f => f.classified);
    }
    if (currentSort === "rarity")  list.sort((a,b) => (RARITY_META[a.rarity]?.order||9) - (RARITY_META[b.rarity]?.order||9));
    if (currentSort === "alpha")   list.sort((a,b) => a.name.localeCompare(b.name));
    if (currentSort === "power")   list.sort((a,b) => b.power - a.power);
    return list;
  }

  // ══════════════════════════════════════════════════════════
  // BUILD ROW
  // ══════════════════════════════════════════════════════════
  function buildRow(fruit, index) {
    const rm = RARITY_META[fruit.rarity] || RARITY_META.commun;
    const isSelected = fruit.id === selectedId;
    const isSpoilerHide = spoilerMode && fruit.spoiler;
    const num = String(index + 1).padStart(4, '0');

    if (fruit.classified) {
      return `
        <div class="archive-row rv-interdit classified-row ${isSelected ? 'selected' : ''}"
             onclick="selectFruit(${fruit.id})"
             style="animation-delay:${index*30}ms">
          <div class="cl-row-bar"></div>
          <div class="row-accent"></div>
          <div class="row-num" style="color:#2A0010">#${num}</div>
          <div class="row-emoji-cell" style="opacity:.3">🔒</div>
          <div class="row-body">
            <div class="row-name row-redacted">████ ████ ██ ██</div>
            <div class="classified-stamp">CLASSIFIÉ — ACCÈS NIVEAU 5 REQUIS</div>
            <div class="row-tags" style="color:#1A0008">Gouvernement Mondial · Dossier scellé</div>
          </div>
          <div class="row-right">
            <span class="rbadge rv-interdit" style="--rc:#DC2626;--rg:rgba(220,38,38,.4);--rb:rgba(220,38,38,.08)">INTERDIT</span>
          </div>
        </div>`;
    }

    const nameShow = isSpoilerHide ? `<span class="spblur">${fruit.name}</span>` : fruit.name;
    const userShow = isSpoilerHide ? `<span class="spblur">${fruit.user}</span>` : fruit.user;

    return `
      <div class="archive-row ${rm.cls} ${isSelected ? 'selected' : ''}"
           onclick="selectFruit(${fruit.id})"
           style="animation-delay:${index*30}ms;--rc:${rm.color};--rg:${rm.glow};--rb:${rm.bg}">
        <div class="row-accent" style="background:${rm.color}"></div>
        <div class="row-num">#${num}</div>
        <div class="row-emoji-cell">${fruit.emoji}</div>
        <div class="row-body">
          <div class="row-name">${nameShow}</div>
          <div class="row-meta">
            <span style="color:${TYPE_META[fruit.type]?.color || '#666'}">${fruit.type}</span>
            <span class="sep">·</span>
            <span>${userShow}</span>
          </div>
          <div class="row-tags">${fruit.tags.slice(0,3).join(' · ')}</div>
        </div>
        <div class="row-right">
          <span class="rbadge" style="--rc:${rm.color};--rg:${rm.glow};--rb:${rm.bg}">${rm.label}</span>
          <button class="fav-btn" onclick="event.stopPropagation()" title="Favori">♡</button>
        </div>
      </div>`;
  }

  // ══════════════════════════════════════════════════════════
  // RENDER REGISTER
  // ══════════════════════════════════════════════════════════
  function renderRegister() {
    const list = getFiltered();
    const el = document.getElementById('register-rows');
    document.getElementById('result-count').textContent = list.length;

    if (list.length === 0) {
      el.innerHTML = `<div class="reg-empty"><div class="reg-empty-icon">📂</div><div class="reg-empty-text">Aucun dossier trouvé</div></div>`;
    } else {
      el.innerHTML = list.map((f,i) => buildRow(f,i)).join('');
    }
  }

            <div class="power-bar-track">
              <div class="power-bar-fill" style="--rc:${rm.color};width:${fruit.power}%"></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:4px">
              <span style="font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:.15em;color:#1A1A26;text-transform:uppercase">Puissance</span>
              <span style="font-family:'Cinzel',serif;font-size:11px;color:${rm.color}">${fruit.power}/100</span>
            </div>
          </div>
          <div class="detail-divider"></div>
          <div class="detail-section-lbl">Description</div>
          <div class="detail-desc">${descDisplay}</div>
          <div class="detail-section-lbl">Notes d'archive</div>
          <div class="detail-lore-box" style="--rc:${rm.color}">
            <div class="detail-lore-text">${loreDisplay}</div>
          </div>
          <div class="detail-section-lbl">Tags</div>
          <div class="detail-tags">
            ${fruit.tags.map(t => `<span class="dtag" style="--rc:${rm.color};--rb:${rm.bg}">${t}</span>`).join('')}
          </div>
          <div class="detail-stats-row">
            <div class="dstat"><span class="dstat-lbl">Type</span><span class="dstat-val" style="color:${tm.color};font-size:11px">${fruit.type}</span></div>
            <div class="dstat"><span class="dstat-lbl">Catégorie</span><span class="dstat-val" style="font-size:11px">${fruit.category}</span></div>
            <div class="dstat"><span class="dstat-lbl">Spoiler</span><span class="dstat-val" style="font-size:10px;color:${fruit.spoiler?'#EAB308':'#2A2A38'}">${fruit.spoiler ? 'OUI' : 'NON'}</span></div>
            <div class="dstat"><span class="dstat-lbl">Statut</span><span class="dstat-val" style="font-size:10px;color:#10B981">ACCESSIBLE</span></div>
          </div>
          <div class="detail-divider"></div>
          <div class="detail-actions">
            <button class="action-btn primary" style="--rc:${rm.color};--rg:${rm.glow};--rb:${rm.bg}">
              <i data-lucide="star" style="width:11px;height:11px"></i>Favori
            </button>
            <button class="action-btn" onclick="clearSelection()">
              <i data-lucide="x" style="width:11px;height:11px"></i>Fermer
            </button>
          </div>
          <div style="height:20px"></div>
        </div>
      </div>`;
    lucide.createIcons();
  }

  // ══════════════════════════════════════════════════════════
  // SELECT / CLEAR
  // ══════════════════════════════════════════════════════════
  function selectFruit(id) {
    selectedId = id;
    document.querySelectorAll('.archive-row').forEach(r => r.classList.remove('selected'));
    const row = document.getElementById(`row-${id}`);
    if (row) row.classList.add('selected');
    const fruit = FRUITS.find(f => f.id === id);
    if (fruit) renderDetailSelected(fruit);
  }

  function selectFruitById(id) {
    selectedId = id;
    renderRegister();
    const fruit = FRUITS.find(f => f.id === id);
    if (fruit) renderDetailSelected(fruit);
  }

  function clearSelection() {
    selectedId = null;
    renderRegister();
    renderDetailDefault();
  }

  // ══════════════════════════════════════════════════════════
  // CATEGORY COUNTS
  // ══════════════════════════════════════════════════════════
  function updateCounts() {
    const cats = { tout:0, fruit:0, personnage:0, equipage:0, arc:0, haki:0, ile:0, mystere:0, secret:0 };
    FRUITS.forEach(f => {
      cats.tout++;
      if (f.classified) cats.secret++;
      else if (cats[f.category] !== undefined) cats[f.category]++;
    });
    Object.keys(cats).forEach(c => {
      const el = document.getElementById(`cnt-${c}`);
      if (el) el.textContent = cats[c];
    });
    document.getElementById('sb-total').textContent = cats.tout;
    document.getElementById('sb-secrets').textContent = cats.secret;
    document.getElementById('stat-total').textContent = cats.tout;
    document.getElementById('stat-secrets').textContent = cats.secret;
  }

  // ══════════════════════════════════════════════════════════
  // EVENTS
  // ══════════════════════════════════════════════════════════
  document.querySelectorAll('.sbcat').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sbcat').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      selectedId = null;
      renderRegister();
      renderDetailDefault();
    });
  });

  document.querySelectorAll('.ftab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      selectedId = null;
      renderRegister();
      renderDetailDefault();
    });
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      renderRegister();
    });
  });

  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      selectedId = null;
      renderRegister();
      renderDetailDefault();
    }, 180);
  });

  document.getElementById('spoiler-toggle').addEventListener('click', () => {
    spoilerMode = !spoilerMode;
    const sw = document.getElementById('sp-switch');
    const btn = document.getElementById('spoiler-toggle');
    sw.classList.toggle('on', spoilerMode);
    btn.classList.toggle('on', spoilerMode);
    renderRegister();
    if (selectedId) {
      const f = FRUITS.find(x => x.id === selectedId);
      if (f) renderDetailSelected(f);
    } else {
      renderDetailDefault();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') clearSelection();
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      const list = getFiltered();
      const ci = list.findIndex(f => f.id === selectedId);
      const ni = e.key === 'ArrowDown' ? ci + 1 : ci - 1;
      if (ni >= 0 && ni < list.length) { e.preventDefault(); selectFruitById(list[ni].id); }
    }
  });

  // ══════════════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════════════
  window.addEventListener('DOMContentLoaded', () => {
    updateCounts();
    renderRegister();
    renderDetailDefault();
    lucide.createIcons();
  });
  </script>
</body>
</html>
